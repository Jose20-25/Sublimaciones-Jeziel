<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --light-bg: #ecf0f1;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --shadow-light: 0 2px 10px rgba(0,0,0,0.06);
            --shadow-medium: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-heavy: 0 8px 30px rgba(0,0,0,0.12);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .sidebar {
            background: linear-gradient(180deg, var(--primary-color) 0%, #34495e 100%);
            border-right: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8) !important;
            font-weight: 500;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: var(--border-radius);
            transition: var(--transition);
            border-left: 3px solid transparent;
        }
        
        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: #fff !important;
            transform: translateX(5px);
            border-left-color: var(--secondary-color);
        }
        
        .sidebar .nav-link.active {
            background: linear-gradient(90deg, var(--secondary-color), #5dade2);
            color: #fff !important;
            box-shadow: var(--shadow-medium);
            border-left-color: #fff;
        }
        
        .logo-img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        
        .logo-img:hover {
            transform: scale(1.1);
            border-color: var(--secondary-color);
        }
        
        .erp-title {
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            font-size: 2.1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            overflow: hidden;
            position: relative;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary-color), var(--accent-color));
            opacity: 0;
            transition: var(--transition);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-heavy);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color), #34495e) !important;
            border: none;
            color: white !important;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }
        
        .table {
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        
        .table thead {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: #fff;
        }
        
        .table thead th {
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 1rem;
        }
        
        .table tbody tr {
            transition: var(--transition);
        }
        
        .table tbody tr:hover {
            background: rgba(52, 152, 219, 0.05);
            transform: scale(1.01);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), #5dade2);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #5dade2, var(--secondary-color));
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #2ecc71);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #17a2b8, #20c997);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #f1c40f);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-color), #e55454);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .form-control, .form-select {
            border: 2px solid rgba(52, 152, 219, 0.2);
            border-radius: 8px;
            padding: 12px;
            transition: var(--transition);
            background: var(--card-bg);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            transform: translateY(-1px);
        }
        
        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .icon-erp {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 0.5rem;
        }
        
        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--secondary-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar position-fixed h-100 d-flex flex-column" style="width: 250px; z-index: 1000;">
        <div class="p-3 border-bottom border-light">
            <div class="d-flex align-items-center">
                <img src="logo/logo.jpg" alt="Logo" class="logo-img me-3">
                <h5 class="text-white mb-0 fw-bold">Jeziel Sublimaciones</h5>
            </div>
        </div>
        
        <nav class="flex-grow-1 p-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link" href="index.html">
                        <i class="fas fa-home me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="clientes.html">
                        <i class="fas fa-users me-2"></i>Clientes
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="ventas.html">
                        <i class="fas fa-shopping-cart me-2"></i>Ventas
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="inventario.html">
                        <i class="fas fa-boxes me-2"></i>Inventario
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="compras.html">
                        <i class="fas fa-shopping-bag me-2"></i>Compras
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="facturas.html">
                        <i class="fas fa-file-invoice me-2"></i>Facturas
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="finanzas.html">
                        <i class="fas fa-chart-line me-2"></i>Finanzas
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link active" href="reportes.html">
                        <i class="fas fa-chart-bar me-2"></i>Reportes
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div style="margin-left: 250px;">
        <!-- Header -->
        <div class="bg-white shadow-sm p-3 mb-4">
            <h2 class="erp-title mb-0"><i class="bi bi-bar-chart-fill icon-erp"></i>Reportes y Estadísticas</h2>
            <p class="text-muted mb-0">Consulta, filtra y exporta información clave de tu negocio</p>
        </div>
        <div class="container-fluid py-4">
        <div class="row mb-3">
            <div class="col-md-3 mb-2">
                <label class="form-label">Tipo de reporte</label>
                <select class="form-select" id="tipoReporte">
                    <option value="ventas">Ventas</option>
                    <option value="compras">Compras</option>
                    <option value="finanzas">Finanzas</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Desde</label>
                <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Hasta</label>
                <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-3 mb-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="filtrarReportes()"><i class="bi bi-funnel"></i> Filtrar</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-12 d-flex justify-content-end gap-2">
                <button class="btn btn-outline-success" onclick="exportarExcel()"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</button>
                <button class="btn btn-outline-danger" onclick="exportarPDF()"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</button>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-12">
                <div class="table-responsive">
                    <table class="table table-striped" id="tablaReportes">
                        <thead>
                            <tr id="theadReportes"></tr>
                        </thead>
                        <tbody id="tbodyReportes"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="bi bi-bar-chart-line-fill me-2"></i>Resumen gráfico</h5>
                        <canvas id="graficoReportes" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="bi bi-pie-chart-fill me-2"></i>Distribución</h5>
                        <canvas id="graficoPieReportes" height="120"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
    // --- Lógica de reportes ---
    let datosVentas = [];
    let datosCompras = [];
    let datosFinanzas = [];
    function cargarDatos() {
        try { datosVentas = JSON.parse(localStorage.getItem('ventasJeziel')) || []; } catch {}
        try { datosCompras = JSON.parse(localStorage.getItem('comprasJeziel')) || []; } catch {}
        try { datosFinanzas = JSON.parse(localStorage.getItem('finanzasJeziel')) || []; } catch {}
    }
    function filtrarReportes() {
        cargarDatos();
        const tipo = document.getElementById('tipoReporte').value;
        const desde = document.getElementById('fechaDesde').value;
        const hasta = document.getElementById('fechaHasta').value;
        let datos = [];
        if (tipo === 'ventas') datos = datosVentas;
        else if (tipo === 'compras') datos = datosCompras;
        else if (tipo === 'finanzas') datos = datosFinanzas;
        // Filtrar por fecha si aplica
        if (desde) datos = datos.filter(d => d.fecha && d.fecha >= desde);
        if (hasta) datos = datos.filter(d => d.fecha && d.fecha <= hasta);
        renderTablaReportes(tipo, datos);
        renderGraficos(tipo, datos);
    }
    function renderTablaReportes(tipo, datos) {
        const thead = document.getElementById('theadReportes');
        const tbody = document.getElementById('tbodyReportes');
        thead.innerHTML = '';
        tbody.innerHTML = '';
        if (tipo === 'ventas') {
            thead.innerHTML = '<th>N° Factura</th><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Total</th>';
            datos.forEach(v => {
                tbody.innerHTML += `<tr><td>${v.numeroFactura||''}</td><td>${v.fecha||''}</td><td>${v.nombreCliente||''}</td><td>${v.nombreProducto||''}</td><td>${v.cantidad||''}</td><td>$${parseFloat(v.total||0).toFixed(2)}</td></tr>`;
            });
        } else if (tipo === 'compras') {
            thead.innerHTML = '<th>Fecha</th><th>Proveedor</th><th>Producto</th><th>Cantidad</th><th>Total</th>';
            datos.forEach(c => {
                tbody.innerHTML += `<tr><td>${c.fecha||''}</td><td>${c.proveedor||''}</td><td>${c.producto||''}</td><td>${c.cantidad||''}</td><td>$${parseFloat(c.total||0).toFixed(2)}</td></tr>`;
            });
        } else if (tipo === 'finanzas') {
            thead.innerHTML = '<th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Monto</th>';
            datos.forEach(f => {
                tbody.innerHTML += `<tr><td>${f.fecha||''}</td><td>${f.tipo||''}</td><td>${f.descripcion||''}</td><td>$${parseFloat(f.monto||0).toFixed(2)}</td></tr>`;
            });
        }
    }
    function renderGraficos(tipo, datos) {
        // Gráfico de barras/resumen
        let ctx = document.getElementById('graficoReportes').getContext('2d');
        let ctxPie = document.getElementById('graficoPieReportes').getContext('2d');
        if (window.graficoBarra) window.graficoBarra.destroy();
        if (window.graficoPie) window.graficoPie.destroy();
        if (tipo === 'ventas') {
            // Agrupar ventas por mes
            let meses = Array(12).fill(0);
            datos.forEach(v => {
                if (v.fecha) {
                    const m = parseInt(v.fecha.split('-')[1])-1;
                    meses[m] += parseFloat(v.total)||0;
                }
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
                    datasets: [{
                        label: 'Ventas',
                        data: meses,
                        backgroundColor: '#ff7e5f',
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: por cliente
            let clientes = {};
            datos.forEach(v => { if(v.nombreCliente) clientes[v.nombreCliente]=(clientes[v.nombreCliente]||0)+parseFloat(v.total||0); });
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Object.keys(clientes),
                    datasets: [{data: Object.values(clientes), backgroundColor: ['#ff7e5f','#feb47b','#4bb543','#1a2235','#ffc107','#17a2b8','#6f42c1'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        } else if (tipo === 'compras') {
            // Agrupar compras por mes
            let meses = Array(12).fill(0);
            datos.forEach(c => {
                if (c.fecha) {
                    const m = parseInt(c.fecha.split('-')[1])-1;
                    meses[m] += parseFloat(c.total)||0;
                }
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
                    datasets: [{
                        label: 'Compras',
                        data: meses,
                        backgroundColor: '#feb47b',
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: por proveedor
            let proveedores = {};
            datos.forEach(c => { if(c.proveedor) proveedores[c.proveedor]=(proveedores[c.proveedor]||0)+parseFloat(c.total||0); });
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Object.keys(proveedores),
                    datasets: [{data: Object.values(proveedores), backgroundColor: ['#ff7e5f','#feb47b','#4bb543','#1a2235','#ffc107','#17a2b8','#6f42c1'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        } else if (tipo === 'finanzas') {
            // Agrupar ingresos/egresos
            let ingresos = 0, egresos = 0;
            datos.forEach(f => {
                if(f.tipo==='Ingreso') ingresos += parseFloat(f.monto)||0;
                else if(f.tipo==='Egreso') egresos += parseFloat(f.monto)||0;
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ingresos','Egresos'],
                    datasets: [{
                        label: 'Finanzas',
                        data: [ingresos, egresos],
                        backgroundColor: ['#4bb543','#ff7e5f'],
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: distribución ingresos/egresos
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['Ingresos','Egresos'],
                    datasets: [{data: [ingresos, egresos], backgroundColor: ['#4bb543','#ff7e5f'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        }
    }
    // Exportar a Excel
    function exportarExcel() {
        const tipo = document.getElementById('tipoReporte').value;
        const tabla = document.getElementById('tablaReportes');
        const wb = XLSX.utils.table_to_book(tabla, {sheet: "Reportes"});
        XLSX.writeFile(wb, `Reporte_${tipo}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
    // Exportar a PDF
    function exportarPDF() {
        const tipo = document.getElementById('tipoReporte').value;
        const doc = new window.jspdf.jsPDF();
        doc.setFontSize(16);
        doc.text('Reporte de ' + tipo.charAt(0).toUpperCase() + tipo.slice(1), 14, 18);
        doc.setFontSize(10);
        const tabla = document.getElementById('tablaReportes');
        let y = 28;
        // Encabezados
        let headers = [];
        tabla.querySelectorAll('thead th').forEach(th => headers.push(th.textContent));
        doc.text(headers.join(' | '), 14, y);
        y += 8;
        // Filas
        tabla.querySelectorAll('tbody tr').forEach(tr => {
            let row = [];
            tr.querySelectorAll('td').forEach(td => row.push(td.textContent));
            doc.text(row.join(' | '), 14, y);
            y += 8;
            if (y > 270) { doc.addPage(); y = 18; }
        });
        doc.save(`Reporte_${tipo}_${new Date().toISOString().slice(0,10)}.pdf`);
    }
    // Inicializar
    filtrarReportes();
    </script>
    </div> <!-- Cierre de main content -->
</body>
