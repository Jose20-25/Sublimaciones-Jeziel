<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e3e6ed 100%);
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .erp-title {
            font-weight: 700;
            color: #1a2235;
            letter-spacing: 2px;
            font-size: 2.1rem;
        }
        .table thead {
            background: #1a2235;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #feb47b 0%, #ff7e5f 100%);
        }
        .icon-erp {
            font-size: 2rem;
            color: #ff7e5f;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a2235;">
        <div class="container-fluid">
            <a class="navbar-brand erp-title d-flex align-items-center gap-2" href="#">
                <img src="logo/logo.jpg" alt="Logo" style="height:38px;width:38px;border-radius:8px;object-fit:cover;box-shadow:0 2px 8px #0002;">
                <span style="font-size:1.5rem;font-weight:700;letter-spacing:1px;">Sublimaciones Jeziel</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="compras.html">Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="finanzas.html">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h2 class="erp-title mb-2"><i class="bi bi-bar-chart-fill icon-erp"></i>Reportes y Estadísticas</h2>
                <p class="lead">Consulta, filtra y exporta información clave de tu negocio</p>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-3 mb-2">
                <label class="form-label">Tipo de reporte</label>
                <select class="form-select" id="tipoReporte">
                    <option value="ventas">Ventas</option>
                    <option value="compras">Compras</option>
                    <option value="finanzas">Finanzas</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Desde</label>
                <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Hasta</label>
                <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-3 mb-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="filtrarReportes()"><i class="bi bi-funnel"></i> Filtrar</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-12 d-flex justify-content-end gap-2">
                <button class="btn btn-outline-success" onclick="exportarExcel()"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</button>
                <button class="btn btn-outline-danger" onclick="exportarPDF()"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</button>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-12">
                <div class="table-responsive">
                    <table class="table table-striped" id="tablaReportes">
                        <thead>
                            <tr id="theadReportes"></tr>
                        </thead>
                        <tbody id="tbodyReportes"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="bi bi-bar-chart-line-fill me-2"></i>Resumen gráfico</h5>
                        <canvas id="graficoReportes" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="bi bi-pie-chart-fill me-2"></i>Distribución</h5>
                        <canvas id="graficoPieReportes" height="120"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
    // --- Lógica de reportes ---
    let datosVentas = [];
    let datosCompras = [];
    let datosFinanzas = [];
    function cargarDatos() {
        try { datosVentas = JSON.parse(localStorage.getItem('ventasJeziel')) || []; } catch {}
        try { datosCompras = JSON.parse(localStorage.getItem('comprasJeziel')) || []; } catch {}
        try { datosFinanzas = JSON.parse(localStorage.getItem('finanzasJeziel')) || []; } catch {}
    }
    function filtrarReportes() {
        cargarDatos();
        const tipo = document.getElementById('tipoReporte').value;
        const desde = document.getElementById('fechaDesde').value;
        const hasta = document.getElementById('fechaHasta').value;
        let datos = [];
        if (tipo === 'ventas') datos = datosVentas;
        else if (tipo === 'compras') datos = datosCompras;
        else if (tipo === 'finanzas') datos = datosFinanzas;
        // Filtrar por fecha si aplica
        if (desde) datos = datos.filter(d => d.fecha && d.fecha >= desde);
        if (hasta) datos = datos.filter(d => d.fecha && d.fecha <= hasta);
        renderTablaReportes(tipo, datos);
        renderGraficos(tipo, datos);
    }
    function renderTablaReportes(tipo, datos) {
        const thead = document.getElementById('theadReportes');
        const tbody = document.getElementById('tbodyReportes');
        thead.innerHTML = '';
        tbody.innerHTML = '';
        if (tipo === 'ventas') {
            thead.innerHTML = '<th>N° Factura</th><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Total</th>';
            datos.forEach(v => {
                tbody.innerHTML += `<tr><td>${v.numeroFactura||''}</td><td>${v.fecha||''}</td><td>${v.nombreCliente||''}</td><td>${v.nombreProducto||''}</td><td>${v.cantidad||''}</td><td>$${parseFloat(v.total||0).toFixed(2)}</td></tr>`;
            });
        } else if (tipo === 'compras') {
            thead.innerHTML = '<th>Fecha</th><th>Proveedor</th><th>Producto</th><th>Cantidad</th><th>Total</th>';
            datos.forEach(c => {
                tbody.innerHTML += `<tr><td>${c.fecha||''}</td><td>${c.proveedor||''}</td><td>${c.producto||''}</td><td>${c.cantidad||''}</td><td>$${parseFloat(c.total||0).toFixed(2)}</td></tr>`;
            });
        } else if (tipo === 'finanzas') {
            thead.innerHTML = '<th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Monto</th>';
            datos.forEach(f => {
                tbody.innerHTML += `<tr><td>${f.fecha||''}</td><td>${f.tipo||''}</td><td>${f.descripcion||''}</td><td>$${parseFloat(f.monto||0).toFixed(2)}</td></tr>`;
            });
        }
    }
    function renderGraficos(tipo, datos) {
        // Gráfico de barras/resumen
        let ctx = document.getElementById('graficoReportes').getContext('2d');
        let ctxPie = document.getElementById('graficoPieReportes').getContext('2d');
        if (window.graficoBarra) window.graficoBarra.destroy();
        if (window.graficoPie) window.graficoPie.destroy();
        if (tipo === 'ventas') {
            // Agrupar ventas por mes
            let meses = Array(12).fill(0);
            datos.forEach(v => {
                if (v.fecha) {
                    const m = parseInt(v.fecha.split('-')[1])-1;
                    meses[m] += parseFloat(v.total)||0;
                }
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
                    datasets: [{
                        label: 'Ventas',
                        data: meses,
                        backgroundColor: '#ff7e5f',
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: por cliente
            let clientes = {};
            datos.forEach(v => { if(v.nombreCliente) clientes[v.nombreCliente]=(clientes[v.nombreCliente]||0)+parseFloat(v.total||0); });
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Object.keys(clientes),
                    datasets: [{data: Object.values(clientes), backgroundColor: ['#ff7e5f','#feb47b','#4bb543','#1a2235','#ffc107','#17a2b8','#6f42c1'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        } else if (tipo === 'compras') {
            // Agrupar compras por mes
            let meses = Array(12).fill(0);
            datos.forEach(c => {
                if (c.fecha) {
                    const m = parseInt(c.fecha.split('-')[1])-1;
                    meses[m] += parseFloat(c.total)||0;
                }
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
                    datasets: [{
                        label: 'Compras',
                        data: meses,
                        backgroundColor: '#feb47b',
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: por proveedor
            let proveedores = {};
            datos.forEach(c => { if(c.proveedor) proveedores[c.proveedor]=(proveedores[c.proveedor]||0)+parseFloat(c.total||0); });
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Object.keys(proveedores),
                    datasets: [{data: Object.values(proveedores), backgroundColor: ['#ff7e5f','#feb47b','#4bb543','#1a2235','#ffc107','#17a2b8','#6f42c1'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        } else if (tipo === 'finanzas') {
            // Agrupar ingresos/egresos
            let ingresos = 0, egresos = 0;
            datos.forEach(f => {
                if(f.tipo==='Ingreso') ingresos += parseFloat(f.monto)||0;
                else if(f.tipo==='Egreso') egresos += parseFloat(f.monto)||0;
            });
            window.graficoBarra = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ingresos','Egresos'],
                    datasets: [{
                        label: 'Finanzas',
                        data: [ingresos, egresos],
                        backgroundColor: ['#4bb543','#ff7e5f'],
                    }]
                },
                options: {plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
            });
            // Pie: distribución ingresos/egresos
            window.graficoPie = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['Ingresos','Egresos'],
                    datasets: [{data: [ingresos, egresos], backgroundColor: ['#4bb543','#ff7e5f'] }]
                },
                options: {plugins:{legend:{position:'bottom'}}}
            });
        }
    }
    // Exportar a Excel
    function exportarExcel() {
        const tipo = document.getElementById('tipoReporte').value;
        const tabla = document.getElementById('tablaReportes');
        const wb = XLSX.utils.table_to_book(tabla, {sheet: "Reportes"});
        XLSX.writeFile(wb, `Reporte_${tipo}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
    // Exportar a PDF
    function exportarPDF() {
        const tipo = document.getElementById('tipoReporte').value;
        const doc = new window.jspdf.jsPDF();
        doc.setFontSize(16);
        doc.text('Reporte de ' + tipo.charAt(0).toUpperCase() + tipo.slice(1), 14, 18);
        doc.setFontSize(10);
        const tabla = document.getElementById('tablaReportes');
        let y = 28;
        // Encabezados
        let headers = [];
        tabla.querySelectorAll('thead th').forEach(th => headers.push(th.textContent));
        doc.text(headers.join(' | '), 14, y);
        y += 8;
        // Filas
        tabla.querySelectorAll('tbody tr').forEach(tr => {
            let row = [];
            tr.querySelectorAll('td').forEach(td => row.push(td.textContent));
            doc.text(row.join(' | '), 14, y);
            y += 8;
            if (y > 270) { doc.addPage(); y = 18; }
        });
        doc.save(`Reporte_${tipo}_${new Date().toISOString().slice(0,10)}.pdf`);
    }
    // Inicializar
    filtrarReportes();
    </script>
</body>
</html>
