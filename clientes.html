<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e3e6ed 100%);
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .erp-title {
            font-weight: 700;
            color: #1a2235;
            letter-spacing: 2px;
            font-size: 2.1rem;
        }
        .table thead {
            background: #1a2235;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #feb47b 0%, #ff7e5f 100%);
        }
        .icon-erp {
            font-size: 2rem;
            color: #ff7e5f;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a2235;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logo.jpg" alt="Logo" style="width:40px;height:40px;border-radius:50%;margin-right:0.7rem;border:2px solid #ff7e5f;">
                Sublimaciones Jeziel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#finanzas">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#reportes">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <span class="icon-erp"><i class="bi bi-people-fill"></i></span>
            <h2 class="erp-title mb-0">Gestión de Clientes</h2>
        </div>
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-3" id="formAgregarCliente">
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="nombreCliente" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="telefonoCliente" placeholder="Teléfono" required>
                    </div>
                    <div class="col-md-3">
                        <input type="email" class="form-control" id="emailCliente" placeholder="Correo electrónico" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="direccionCliente" placeholder="Dirección" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button type="submit" class="btn btn-primary">Agregar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle" id="tablaClientes">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Correo</th>
                                <th>Dirección</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Clientes aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Clientes persistentes en localStorage
    function cargarClientes() {
        const data = localStorage.getItem('clientesJeziel');
        if (data) {
            try {
                return JSON.parse(data);
            } catch {
                return [];
            }
        }
        return [];
    }
    function guardarClientes() {
        localStorage.setItem('clientesJeziel', JSON.stringify(clientes));
    }
    let clientes = cargarClientes();

    function renderClientes() {
        const tbody = document.querySelector('#tablaClientes tbody');
        tbody.innerHTML = '';
        clientes.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.codigo || ''}</td>
                    <td>${item.nombre}</td>
                    <td>${item.telefono}</td>
                    <td>${item.email}</td>
                    <td>${item.direccion}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarCliente(${idx})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarCliente(${idx})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        guardarClientes();
    }

    // Generar código automático para cliente
    function generarCodigoCliente() {
        return 'C' + Math.floor(Math.random() * 90000 + 10000);
    }
    function eliminarCliente(idx) {
        if(confirm('¿Eliminar este cliente?')) {
            clientes.splice(idx, 1);
            renderClientes();
        }
    }
    // Edición de clientes
    let editIndex = null;
    function editarCliente(idx) {
        const c = clientes[idx];
        document.getElementById('nombreCliente').value = c.nombre;
        document.getElementById('telefonoCliente').value = c.telefono;
        document.getElementById('emailCliente').value = c.email;
        document.getElementById('direccionCliente').value = c.direccion;
        editIndex = idx;
        document.querySelector('#formAgregarCliente button[type="submit"]').textContent = 'Actualizar';
    }
    document.getElementById('formAgregarCliente').addEventListener('submit', function(e) {
        e.preventDefault();
        const nombre = document.getElementById('nombreCliente').value.trim();
        const telefono = document.getElementById('telefonoCliente').value.trim();
        const email = document.getElementById('emailCliente').value.trim();
        const direccion = document.getElementById('direccionCliente').value.trim();
        if(nombre && telefono && email && direccion) {
            if(editIndex !== null) {
                clientes[editIndex] = {
                    ...clientes[editIndex],
                    nombre, telefono, email, direccion
                };
                editIndex = null;
                document.querySelector('#formAgregarCliente button[type="submit"]').textContent = 'Agregar Cliente';
            } else {
                clientes.push({ codigo: generarCodigoCliente(), nombre, telefono, email, direccion });
            }
            renderClientes();
            this.reset();
        }
    });
    renderClientes();
    </script>
</body>
</html>
