<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e3e6ed 100%);
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .erp-title {
            font-weight: 700;
            color: #1a2235;
            letter-spacing: 2px;
            font-size: 2.1rem;
        }
        .table thead {
            background: #1a2235;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #feb47b 0%, #ff7e5f 100%);
        }
        .icon-erp {
            font-size: 2rem;
            color: #4bb543;
            margin-right: 0.5rem;
        }
        .resumen-box {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 2px 12px rgba(26,34,53,0.08);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }
        .resumen-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a2235;
        }
        .resumen-valor {
            font-size: 2rem;
            font-weight: 700;
            color: #4bb543;
        }
        .resumen-negativo {
            color: #ff7e5f;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a2235;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logo.jpg" alt="Logo" style="width:40px;height:40px;border-radius:50%;margin-right:0.7rem;border:2px solid #ff7e5f;">
                Sublimaciones Jeziel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="compras.html">Compras</a></li>
                    <li class="nav-item"><a class="nav-link active" href="finanzas.html">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#reportes">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <span class="icon-erp"><i class="bi bi-cash-coin"></i></span>
            <h2 class="erp-title mb-0">Gestión de Finanzas</h2>
        </div>
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="resumen-box text-center">
                    <div class="resumen-title">Ingresos del mes</div>
                    <div class="resumen-valor" id="ingresosMes">$0.00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="resumen-box text-center">
                    <div class="resumen-title">Egresos del mes</div>
                    <div class="resumen-valor resumen-negativo" id="egresosMes">$0.00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="resumen-box text-center">
                    <div class="resumen-title">Balance</div>
                    <div class="resumen-valor" id="balanceMes">$0.00</div>
                </div>
            </div>
        </div>
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-3" id="formAgregarMovimiento">
                    <div class="col-md-3">
                        <input type="date" class="form-control" id="fechaMovimiento" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="conceptoMovimiento" placeholder="Concepto" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="montoMovimiento" placeholder="Monto ($)" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="tipoMovimiento" required>
                            <option value="Ingreso">Ingreso</option>
                            <option value="Egreso">Egreso</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle" id="tablaMovimientos">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Concepto</th>
                                <th>Monto</th>
                                <th>Tipo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Movimientos aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Finanzas persistentes en localStorage
    function cargarMovimientos() {
        const data = localStorage.getItem('finanzasJeziel');
        if (data) {
            try {
                return JSON.parse(data);
            } catch {
                return [];
            }
        }
        return [];
    }
    function guardarMovimientos() {
        localStorage.setItem('finanzasJeziel', JSON.stringify(movimientos));
    }
    let movimientos = cargarMovimientos();

    function renderMovimientos() {
        const tbody = document.querySelector('#tablaMovimientos tbody');
        tbody.innerHTML = '';
        movimientos.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.fecha}</td>
                    <td>${item.concepto}</td>
                    <td class="${item.tipo === 'Egreso' ? 'resumen-negativo' : ''}">$${parseFloat(item.monto).toFixed(2)}</td>
                    <td>${item.tipo}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarMovimiento(${idx})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarMovimiento(${idx})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        guardarMovimientos();
        actualizarResumen();
    }
    function eliminarMovimiento(idx) {
        if(confirm('¿Eliminar este movimiento?')) {
            movimientos.splice(idx, 1);
            renderMovimientos();
        }
    }
    // Edición de movimientos
    let editIndex = null;
    function editarMovimiento(idx) {
        const m = movimientos[idx];
        document.getElementById('fechaMovimiento').value = m.fecha;
        document.getElementById('conceptoMovimiento').value = m.concepto;
        document.getElementById('montoMovimiento').value = m.monto;
        document.getElementById('tipoMovimiento').value = m.tipo;
        editIndex = idx;
        document.querySelector('#formAgregarMovimiento button[type="submit"]').textContent = 'Actualizar';
    }
    // Resumen de ingresos, egresos y balance del mes actual
    function actualizarResumen() {
        const hoy = new Date();
        const mes = hoy.getMonth() + 1;
        const anio = hoy.getFullYear();
        let ingresos = 0, egresos = 0;
        movimientos.forEach(m => {
            if (!m.fecha) return;
            const [a, mth] = m.fecha.split('-');
            if (parseInt(a) === anio && parseInt(mth) === mes) {
                if (m.tipo === 'Ingreso') ingresos += parseFloat(m.monto) || 0;
                else egresos += parseFloat(m.monto) || 0;
            }
        });
        document.getElementById('ingresosMes').textContent = '$' + ingresos.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById('egresosMes').textContent = '$' + egresos.toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
        document.getElementById('balanceMes').textContent = '$' + (ingresos-egresos).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
    }
    // Fecha automática
    function setFechaHoyFinanzas() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        const mm = String(hoy.getMonth() + 1).padStart(2, '0');
        const dd = String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fechaMovimiento').value = `${yyyy}-${mm}-${dd}`;
    }
    setFechaHoyFinanzas();

    document.getElementById('formAgregarMovimiento').addEventListener('submit', function(e) {
        e.preventDefault();
        const fecha = document.getElementById('fechaMovimiento').value;
        const concepto = document.getElementById('conceptoMovimiento').value.trim();
        const monto = parseFloat(document.getElementById('montoMovimiento').value);
        const tipo = document.getElementById('tipoMovimiento').value;
        if(fecha && concepto && monto >= 0 && tipo) {
            if(editIndex !== null) {
                movimientos[editIndex] = {
                    ...movimientos[editIndex],
                    fecha, concepto, monto, tipo
                };
                editIndex = null;
                document.querySelector('#formAgregarMovimiento button[type="submit"]').textContent = 'Agregar';
            } else {
                movimientos.push({ fecha, concepto, monto, tipo });
            }
            renderMovimientos();
            this.reset();
            setFechaHoyFinanzas();
        }
    });
    renderMovimientos();
    </script>
</body>
</html>
