<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e3e6ed 100%);
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .erp-title {
            font-weight: 700;
            color: #1a2235;
            letter-spacing: 2px;
            font-size: 2.1rem;
        }
        .table thead {
            background: #1a2235;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #feb47b 0%, #ff7e5f 100%);
        }
        .icon-erp {
            font-size: 2rem;
            color: #ff7e5f;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a2235;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logo.jpg" alt="Logo" style="width:40px;height:40px;border-radius:50%;margin-right:0.7rem;border:2px solid #ff7e5f;">
                Sublimaciones Jeziel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="finanzas.html">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#reportes">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <span class="icon-erp"><i class="bi bi-box-seam"></i></span>
            <h2 class="erp-title mb-0">Inventario de Productos</h2>
        </div>
        <div class="row mb-3">
            <div class="col-md-4 ms-auto">
                <input type="text" class="form-control" id="buscadorCodigo" placeholder="Buscar por Código de producto...">
            </div>
        </div>
        <div class="card mb-4">
            <div class="card-body">
                <div class="mb-3 d-flex justify-content-end gap-2">
                    <button class="btn btn-outline-success" id="btnExportarExcel" type="button"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</button>
                    <button class="btn btn-outline-danger" id="btnExportarPDF" type="button"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</button>
                </div>
                <form class="row g-3" id="formAgregar">
                    <div class="col-md-2">
                        <input type="text" class="form-control" id="nombreProducto" placeholder="Producto" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" class="form-control" id="categoriaProducto" placeholder="Categoría" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="precioCompra" placeholder="Precio de compra" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="precioVenta" placeholder="Precio de venta" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="stockInicial" placeholder="Stock inicial" min="1" required>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle" id="tablaInventario">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio Compra</th>
                                <th>Precio Venta</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Productos aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJS para exportar a Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- jsPDF y autotable para exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
    <script>
    // Exportar a Excel
    document.getElementById('btnExportarExcel').addEventListener('click', function() {
        const ws_data = [
            ['Código', 'Producto', 'Categoría', 'Precio Compra', 'Precio Venta', 'Stock']
        ];
        inventario.forEach(item => {
            ws_data.push([
                item.codigo,
                item.nombre,
                item.categoria,
                item.precioCompra,
                item.precioVenta,
                item.stock
            ]);
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
        XLSX.writeFile(wb, 'Inventario_Jeziel.xlsx');
    });

    // Exportar a PDF
    document.getElementById('btnExportarPDF').addEventListener('click', function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'A4' });
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.text('Reporte de Inventario - Sublimaciones Jeziel', 40, 40);
        doc.setFontSize(12);
        doc.setTextColor('#555');
        doc.text('Fecha: ' + new Date().toLocaleDateString(), 40, 65);
        doc.autoTable({
            startY: 90,
            head: [[
                'Código', 'Producto', 'Categoría', 'Precio Compra', 'Precio Venta', 'Stock'
            ]],
            body: inventario.map(item => [
                item.codigo,
                item.nombre,
                item.categoria,
                '$' + item.precioCompra.toFixed(2),
                '$' + item.precioVenta.toFixed(2),
                item.stock
            ]),
            styles: {
                font: 'helvetica', fontSize: 11, cellPadding: 5, valign: 'middle', textColor: '#222',
                lineColor: [220,220,220], lineWidth: 0.5
            },
            headStyles: {
                fillColor: [26,34,53], textColor: '#fff', fontStyle: 'bold', fontSize: 12
            },
            alternateRowStyles: { fillColor: [248,249,250] },
            tableLineColor: [220,220,220],
            tableLineWidth: 0.5,
            margin: { left: 40, right: 40 }
        });
        doc.save('Inventario_Jeziel.pdf');
    });

    // Buscador de producto por Código
    document.getElementById('buscadorCodigo').addEventListener('input', function() {
        renderInventario(this.value.trim());
    });
    </script>
    <script>

    // Inventario persistente en localStorage
    function cargarInventario() {
        const data = localStorage.getItem('inventarioJeziel');
        if (data) {
            try {
                return JSON.parse(data);
            } catch {
                return [];
            }
        }
        // Si no hay datos, inicializa con algunos productos de ejemplo
        return [
            { codigo: generarCodigo(), nombre: 'Taza personalizada', categoria: 'Cerámica', precioCompra: 30, precioVenta: 60, stock: 20 },
            { codigo: generarCodigo(), nombre: 'Playera estampada', categoria: 'Textil', precioCompra: 50, precioVenta: 120, stock: 15 },
            { codigo: generarCodigo(), nombre: 'Cojín decorativo', categoria: 'Hogar', precioCompra: 40, precioVenta: 90, stock: 10 }
        ];
    }
    function guardarInventario() {
        localStorage.setItem('inventarioJeziel', JSON.stringify(inventario));
    }
    let inventario = cargarInventario();

    function generarCodigo() {
        return 'P' + Math.floor(Math.random() * 90000 + 10000);
    }

function renderInventario(filtroCodigo = '') {
    const tbody = document.querySelector('#tablaInventario tbody');
    tbody.innerHTML = '';
    let lista = inventario;
    if (filtroCodigo) {
        lista = inventario.filter(item => item.codigo.toLowerCase().includes(filtroCodigo.toLowerCase()));
    }
    lista.forEach((item, idx) => {
        // El índice real en inventario (para editar/eliminar) puede diferir si hay filtro
        const realIdx = inventario.findIndex(prod => prod.codigo === item.codigo);
        tbody.innerHTML += `
            <tr>
                <td>${item.codigo}</td>
                <td>${item.nombre}</td>
                <td>${item.categoria}</td>
                <td>$${item.precioCompra.toFixed(2)}</td>
                <td>$${item.precioVenta.toFixed(2)}</td>
                <td>${item.stock}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-1" onclick="editarProducto(${realIdx})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarProducto(${realIdx})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `;
    });
    guardarInventario();
}
    function eliminarProducto(idx) {
        if(confirm('¿Eliminar este producto?')) {
            inventario.splice(idx, 1);
            renderInventario();
        }
    }

    // Edición de productos
    let editIndex = null;
    function editarProducto(idx) {
        const prod = inventario[idx];
        document.getElementById('nombreProducto').value = prod.nombre;
        document.getElementById('categoriaProducto').value = prod.categoria;
        document.getElementById('precioCompra').value = prod.precioCompra;
        document.getElementById('precioVenta').value = prod.precioVenta;
        document.getElementById('stockInicial').value = prod.stock;
        editIndex = idx;
        document.querySelector('#formAgregar button[type="submit"]').textContent = 'Actualizar';
    }
    document.getElementById('formAgregar').addEventListener('submit', function(e) {
        e.preventDefault();
        const nombre = document.getElementById('nombreProducto').value.trim();
        const categoria = document.getElementById('categoriaProducto').value.trim();
        const precioCompra = parseFloat(document.getElementById('precioCompra').value);
        const precioVenta = parseFloat(document.getElementById('precioVenta').value);
        const stock = parseInt(document.getElementById('stockInicial').value);
        if(nombre && categoria && precioCompra >= 0 && precioVenta >= 0 && stock > 0) {
            if(editIndex !== null) {
                // Actualizar producto existente
                inventario[editIndex] = {
                    ...inventario[editIndex],
                    nombre,
                    categoria,
                    precioCompra,
                    precioVenta,
                    stock
                };
                editIndex = null;
                document.querySelector('#formAgregar button[type="submit"]').textContent = 'Agregar';
            } else {
                // Agregar nuevo producto
                inventario.push({
                    codigo: generarCodigo(),
                    nombre,
                    categoria,
                    precioCompra,
                    precioVenta,
                    stock
                });
            }
            renderInventario();
            this.reset();
        }
    });
    renderInventario();
    </script>
</body>
</html>
