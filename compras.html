<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e3e6ed 100%);
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .erp-title {
            font-weight: 700;
            color: #1a2235;
            letter-spacing: 2px;
            font-size: 2.1rem;
        }
        .table thead {
            background: #1a2235;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #ff7e5f 0%, #feb47b 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #feb47b 0%, #ff7e5f 100%);
        }
        .icon-erp {
            font-size: 2rem;
            color: #ff7e5f;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a2235;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logo.jpg" alt="Logo" style="width:40px;height:40px;border-radius:50%;margin-right:0.7rem;border:2px solid #ff7e5f;">
                Sublimaciones Jeziel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="compras.html">Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#finanzas">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#reportes">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <span class="icon-erp"><i class="bi bi-cart-plus"></i></span>
            <h2 class="erp-title mb-0">Gestión de Compras</h2>
        </div>
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-3" id="formAgregarCompra">
                    <div class="col-md-2">
                        <input type="date" class="form-control" id="fechaCompra" required readonly>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="proveedorCompra" placeholder="Proveedor" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="productoCompra" placeholder="Producto" list="listaProductos" autocomplete="off" required>
                        <datalist id="listaProductos"></datalist>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="cantidadCompra" placeholder="Cantidad" min="1" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="totalCompra" placeholder="Total ($)" min="0" step="0.01" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button type="submit" class="btn btn-primary">Agregar Compra</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle" id="tablaCompras">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Proveedor</th>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Compras aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Compras persistentes en localStorage
    function cargarCompras() {
        const data = localStorage.getItem('comprasJeziel');
        if (data) {
            try {
                return JSON.parse(data);
            } catch {
                return [];
            }
        }
        return [];
    }
    function guardarCompras() {
        localStorage.setItem('comprasJeziel', JSON.stringify(compras));
    }
    let compras = cargarCompras();

    function renderCompras() {
        const tbody = document.querySelector('#tablaCompras tbody');
        tbody.innerHTML = '';
        compras.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.fecha}</td>
                    <td>${item.proveedor}</td>
                    <td>${item.producto}</td>
                    <td>${item.cantidad}</td>
                    <td>$${parseFloat(item.total).toFixed(2)}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarCompra(${idx})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarCompra(${idx})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        guardarCompras();
    }
    function eliminarCompra(idx) {
        if(confirm('¿Eliminar esta compra?')) {
            // Eliminar egreso correspondiente en finanzas
            const compra = compras[idx];
            let movimientos = [];
            try {
                movimientos = JSON.parse(localStorage.getItem('finanzasJeziel')) || [];
            } catch {}
            // Buscar el egreso por fecha, monto y concepto generado
            const concepto = `Compra: ${compra.producto} (${compra.proveedor})`;
            const movIdx = movimientos.findIndex(m => m.fecha === compra.fecha && m.monto == compra.total && m.tipo === 'Egreso' && m.concepto === concepto);
            if(movIdx !== -1) {
                movimientos.splice(movIdx, 1);
                localStorage.setItem('finanzasJeziel', JSON.stringify(movimientos));
            }
            compras.splice(idx, 1);
            renderCompras();
        }
    }
    // Edición de compras
    let editIndex = null;
    function editarCompra(idx) {
        const c = compras[idx];
        document.getElementById('fechaCompra').value = c.fecha;
        document.getElementById('proveedorCompra').value = c.proveedor;
        document.getElementById('productoCompra').value = c.producto;
        document.getElementById('cantidadCompra').value = c.cantidad;
        document.getElementById('totalCompra').value = c.total;
        editIndex = idx;
        document.querySelector('#formAgregarCompra button[type="submit"]').textContent = 'Actualizar';
    }
    // Llenar datalist de productos desde inventario
    function llenarDatalistProductos() {
        const datalist = document.getElementById('listaProductos');
        datalist.innerHTML = '';
        try {
            const inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
            inventario.forEach(prod => {
                const option = document.createElement('option');
                option.value = prod.nombre;
                option.setAttribute('data-precio', prod.precio || 0);
                datalist.appendChild(option);
            });
        } catch {}
    }
    llenarDatalistProductos();

    // Fecha automática
    function setFechaHoyCompra() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        const mm = String(hoy.getMonth() + 1).padStart(2, '0');
        const dd = String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fechaCompra').value = `${yyyy}-${mm}-${dd}`;
    }
    setFechaHoyCompra();
    // Calcular total automáticamente
    function calcularTotalCompra() {
        const producto = document.getElementById('productoCompra').value.trim();
        const cantidad = parseFloat(document.getElementById('cantidadCompra').value);
        if (!producto || isNaN(cantidad) || cantidad <= 0) {
            document.getElementById('totalCompra').value = '';
            return;
        }
        try {
            const inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
            const prod = inventario.find(p => p.nombre.toLowerCase() === producto.toLowerCase());
            if (prod && prod.precio) {
                const total = parseFloat(prod.precio) * cantidad;
                document.getElementById('totalCompra').value = total.toFixed(2);
            } else {
                document.getElementById('totalCompra').value = '';
            }
        } catch {
            document.getElementById('totalCompra').value = '';
        }
    }

    document.getElementById('productoCompra').addEventListener('input', calcularTotalCompra);
    document.getElementById('cantidadCompra').addEventListener('input', calcularTotalCompra);

    document.getElementById('formAgregarCompra').addEventListener('submit', function(e) {
        e.preventDefault();
        const fecha = document.getElementById('fechaCompra').value;
        const proveedor = document.getElementById('proveedorCompra').value.trim();
        const producto = document.getElementById('productoCompra').value.trim();
        const cantidad = parseInt(document.getElementById('cantidadCompra').value);
        const total = parseFloat(document.getElementById('totalCompra').value);
        if(fecha && proveedor && producto && cantidad > 0 && total >= 0) {
            if(editIndex !== null) {
                compras[editIndex] = {
                    ...compras[editIndex],
                    fecha, proveedor, producto, cantidad, total
                };
                editIndex = null;
                document.querySelector('#formAgregarCompra button[type="submit"]').textContent = 'Agregar Compra';
            } else {
                // Sumar stock al producto en inventario
                try {
                    let inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
                    const idx = inventario.findIndex(p => p.nombre.toLowerCase() === producto.toLowerCase());
                    if(idx !== -1) {
                        let stockActual = parseInt(inventario[idx].stock) || 0;
                        inventario[idx].stock = stockActual + cantidad;
                        localStorage.setItem('inventarioJeziel', JSON.stringify(inventario));
                        compras.push({ fecha, proveedor, producto, cantidad, total });
                        // Agregar egreso automático a finanzas
                        let movimientos = [];
                        try {
                            movimientos = JSON.parse(localStorage.getItem('finanzasJeziel')) || [];
                        } catch {}
                        movimientos.push({
                            fecha: fecha,
                            concepto: `Compra: ${producto} (${proveedor})`,
                            monto: total,
                            tipo: 'Egreso'
                        });
                        localStorage.setItem('finanzasJeziel', JSON.stringify(movimientos));
                    } else {
                        alert('Producto no encontrado en inventario.');
                        return;
                    }
                } catch {
                    alert('Error al actualizar inventario.');
                    return;
                }
            }
            renderCompras();
            this.reset();
            setFechaHoyCompra();
        }
    });
    renderCompras();
    </script>
</body>
</html>
