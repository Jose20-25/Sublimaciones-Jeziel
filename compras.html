<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras | Sublimaciones Jeziel</title>
    <link rel="icon" href="logo/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --light-bg: #ecf0f1;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --shadow-light: 0 2px 10px rgba(0,0,0,0.06);
            --shadow-medium: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-heavy: 0 8px 30px rgba(0,0,0,0.12);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .navbar {
            background: linear-gradient(90deg, var(--primary-color), #34495e) !important;
            box-shadow: var(--shadow-medium);
            backdrop-filter: blur(10px);
        }
        
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .nav-link {
            font-weight: 500;
            transition: var(--transition);
            border-radius: 6px;
            margin: 0 4px;
        }
        
        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }
        
        .nav-link.active {
            background: var(--secondary-color) !important;
            box-shadow: var(--shadow-light);
        }
        
        .erp-title {
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
            font-size: 2.1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            overflow: hidden;
            position: relative;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary-color), var(--accent-color));
            opacity: 0;
            transition: var(--transition);
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-heavy);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color), #34495e) !important;
            border: none;
            color: white !important;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }
        
        .table {
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        
        .table thead {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: #fff;
        }
        
        .table thead th {
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 1rem;
        }
        
        .table tbody tr {
            transition: var(--transition);
        }
        
        .table tbody tr:hover {
            background: rgba(52, 152, 219, 0.05);
            transform: scale(1.01);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), #5dade2);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #5dade2, var(--secondary-color));
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #2ecc71);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #17a2b8, #20c997);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #f1c40f);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-color), #e55454);
            border: none;
            box-shadow: var(--shadow-light);
            transition: var(--transition);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .form-control, .form-select {
            border: 2px solid rgba(52, 152, 219, 0.2);
            border-radius: 8px;
            padding: 12px;
            transition: var(--transition);
            background: var(--card-bg);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            transform: translateY(-1px);
        }
        
        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .icon-erp {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 0.5rem;
        }
        
        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--secondary-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logo.jpg" alt="Logo" style="width:40px;height:40px;border-radius:50%;margin-right:0.7rem;border:2px solid var(--secondary-color);">
                Sublimaciones Jeziel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="ventas.html">Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventario.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="compras.html">Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="facturas.html">Facturas</a></li>
                    <li class="nav-item"><a class="nav-link" href="finanzas.html">Finanzas</a></li>
                    <li class="nav-item"><a class="nav-link" href="reportes.html">Reportes</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <span class="icon-erp"><i class="bi bi-cart-plus"></i></span>
            <h2 class="erp-title mb-0">Gestión de Compras</h2>
        </div>
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-3" id="formAgregarCompra">
                    <div class="col-md-2">
                        <input type="date" class="form-control" id="fechaCompra" required readonly>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="proveedorCompra" placeholder="Proveedor" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="productoCompra" placeholder="Producto" list="listaProductos" autocomplete="off" required>
                        <datalist id="listaProductos"></datalist>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="cantidadCompra" placeholder="Cantidad" min="1" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="totalCompra" placeholder="Total ($)" min="0" step="0.01" required>
                    </div>
                    <div class="col-12 d-grid">
                        <button type="submit" class="btn btn-primary">Agregar Compra</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle" id="tablaCompras">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Proveedor</th>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Compras aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 mb-3 text-muted">
        &copy; 2025 Sublimaciones Jeziel. Todos los derechos reservados.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Compras persistentes en localStorage
    function cargarCompras() {
        const data = localStorage.getItem('comprasJeziel');
        if (data) {
            try {
                return JSON.parse(data);
            } catch {
                return [];
            }
        }
        return [];
    }
    function guardarCompras() {
        localStorage.setItem('comprasJeziel', JSON.stringify(compras));
    }
    let compras = cargarCompras();

    function renderCompras() {
        const tbody = document.querySelector('#tablaCompras tbody');
        tbody.innerHTML = '';
        compras.forEach((item, idx) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.fecha}</td>
                    <td>${item.proveedor}</td>
                    <td>${item.producto}</td>
                    <td>${item.cantidad}</td>
                    <td>$${parseFloat(item.total).toFixed(2)}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarCompra(${idx})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarCompra(${idx})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
        guardarCompras();
    }
    function eliminarCompra(idx) {
        if(confirm('¿Eliminar esta compra?')) {
            // Eliminar egreso correspondiente en finanzas
            const compra = compras[idx];
            let movimientos = [];
            try {
                movimientos = JSON.parse(localStorage.getItem('finanzasJeziel')) || [];
            } catch {}
            // Buscar el egreso por fecha, monto y concepto generado
            const concepto = `Compra: ${compra.producto} (${compra.proveedor})`;
            const movIdx = movimientos.findIndex(m => m.fecha === compra.fecha && m.monto == compra.total && m.tipo === 'Egreso' && m.concepto === concepto);
            if(movIdx !== -1) {
                movimientos.splice(movIdx, 1);
                localStorage.setItem('finanzasJeziel', JSON.stringify(movimientos));
            }
            compras.splice(idx, 1);
            renderCompras();
        }
    }
    // Edición de compras
    let editIndex = null;
    function editarCompra(idx) {
        const c = compras[idx];
        document.getElementById('fechaCompra').value = c.fecha;
        document.getElementById('proveedorCompra').value = c.proveedor;
        document.getElementById('productoCompra').value = c.producto;
        document.getElementById('cantidadCompra').value = c.cantidad;
        document.getElementById('totalCompra').value = c.total;
        editIndex = idx;
        document.querySelector('#formAgregarCompra button[type="submit"]').textContent = 'Actualizar';
    }
    // Llenar datalist de productos desde inventario
    function llenarDatalistProductos() {
        const datalist = document.getElementById('listaProductos');
        datalist.innerHTML = '';
        try {
            const inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
            inventario.forEach(prod => {
                const option = document.createElement('option');
                option.value = prod.nombre;
                option.setAttribute('data-precio', prod.precio || 0);
                datalist.appendChild(option);
            });
        } catch {}
    }
    llenarDatalistProductos();

    // Fecha automática
    function setFechaHoyCompra() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        const mm = String(hoy.getMonth() + 1).padStart(2, '0');
        const dd = String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fechaCompra').value = `${yyyy}-${mm}-${dd}`;
    }
    setFechaHoyCompra();
    // Calcular total automáticamente
    function calcularTotalCompra() {
        const producto = document.getElementById('productoCompra').value.trim();
        const cantidad = parseFloat(document.getElementById('cantidadCompra').value);
        if (!producto || isNaN(cantidad) || cantidad <= 0) {
            document.getElementById('totalCompra').value = '';
            return;
        }
        try {
            const inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
            const prod = inventario.find(p => p.nombre.toLowerCase() === producto.toLowerCase());
            if (prod && prod.precio) {
                const total = parseFloat(prod.precio) * cantidad;
                document.getElementById('totalCompra').value = total.toFixed(2);
            } else {
                document.getElementById('totalCompra').value = '';
            }
        } catch {
            document.getElementById('totalCompra').value = '';
        }
    }

    document.getElementById('productoCompra').addEventListener('input', calcularTotalCompra);
    document.getElementById('cantidadCompra').addEventListener('input', calcularTotalCompra);

    document.getElementById('formAgregarCompra').addEventListener('submit', function(e) {
        e.preventDefault();
        const fecha = document.getElementById('fechaCompra').value;
        const proveedor = document.getElementById('proveedorCompra').value.trim();
        const producto = document.getElementById('productoCompra').value.trim();
        const cantidad = parseInt(document.getElementById('cantidadCompra').value);
        const total = parseFloat(document.getElementById('totalCompra').value);
        if(fecha && proveedor && producto && cantidad > 0 && total >= 0) {
            if(editIndex !== null) {
                compras[editIndex] = {
                    ...compras[editIndex],
                    fecha, proveedor, producto, cantidad, total
                };
                editIndex = null;
                document.querySelector('#formAgregarCompra button[type="submit"]').textContent = 'Agregar Compra';
            } else {
                // Sumar stock al producto en inventario
                try {
                    let inventario = JSON.parse(localStorage.getItem('inventarioJeziel')) || [];
                    const idx = inventario.findIndex(p => p.nombre.toLowerCase() === producto.toLowerCase());
                    if(idx !== -1) {
                        let stockActual = parseInt(inventario[idx].stock) || 0;
                        inventario[idx].stock = stockActual + cantidad;
                        localStorage.setItem('inventarioJeziel', JSON.stringify(inventario));
                        compras.push({ fecha, proveedor, producto, cantidad, total });
                        // Agregar egreso automático a finanzas
                        let movimientos = [];
                        try {
                            movimientos = JSON.parse(localStorage.getItem('finanzasJeziel')) || [];
                        } catch {}
                        movimientos.push({
                            fecha: fecha,
                            concepto: `Compra: ${producto} (${proveedor})`,
                            monto: total,
                            tipo: 'Egreso'
                        });
                        localStorage.setItem('finanzasJeziel', JSON.stringify(movimientos));
                    } else {
                        alert('Producto no encontrado en inventario.');
                        return;
                    }
                } catch {
                    alert('Error al actualizar inventario.');
                    return;
                }
            }
            renderCompras();
            this.reset();
            setFechaHoyCompra();
        }
    });
    renderCompras();
    </script>
</body>
</html>
